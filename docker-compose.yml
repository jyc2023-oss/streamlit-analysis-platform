services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DATA_DIR: /app/var
      DATA_ROOTS: /data/raw
    volumes:
      - app_state:/app/var
      - ${HOST_DATA_ROOT:-./sample_data}:/data/raw:ro
    expose:
      - "8501"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "8080:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  app_state:
